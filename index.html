<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XX88 - SIÊU CỔNG QUỐC TẾ 2026</title>
    <style>
        /* =========================================
           1. RESET & NỀN NEON DYNAMIC
           ========================================= */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            /* Nền tối sâu với gradient 3D */
            background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1a 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
            overflow-x: hidden;
            position: relative;
        }

        /* Lớp nền hạt (Particles) hoạt động bằng JS */
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1; /* Nằm dưới nội dung */
        }

        .wrapper {
            max-width: 1400px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 2; /* Nằm trên nền hạt */
        }

        /* =========================================
           2. LOGO XX88 - SIÊU NỔI BẬT
           ========================================= */
        .logo-header { margin-bottom: 50px; }
        .logo-box {
            display: inline-block;
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            padding: 15px 70px;
            border-radius: 20px;
            font-size: 70px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.8), 3px 3px 0 rgba(0,0,0,0.5);
            border: 4px solid #ffcc00;
            box-shadow: 0 0 30px rgba(79, 172, 254, 0.6), inset 0 0 15px rgba(255, 255, 255, 0.3);
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }
        /* Hiệu ứng quét sáng qua logo */
        .logo-box::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(to bottom right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0) 100%);
            transform: rotate(45deg);
            animation: lightSweep 4s infinite;
        }

        /* =========================================
           3. TIÊU ĐỀ - PHONG CÁCH CỰC ĐỘI
           ========================================= */
        .title-section h1 {
            color: #ffcc00;
            font-size: 48px;
            text-transform: uppercase;
            margin-bottom: 15px;
            font-weight: 900;
            letter-spacing: 3px;
            text-shadow: 0 0 20px rgba(255, 204, 0, 0.8);
            background: linear-gradient(to right, #ffcc00, #ff9900);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .title-section p {
            color: #cbd5e1;
            font-size: 20px;
            margin-bottom: 50px;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }

        /* =========================================
           4. GRID CỔNG QUỐC TẾ - SIÊU ĐỘNG
           ========================================= */
        .gate-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            perspective: 1000px; /* Tạo chiều sâu cho 3D */
        }

        .gate-card {
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 25px;
            padding: 50px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        /* HIỆU ỨNG HOVER CỰC MẠNH */
        .gate-card:hover {
            transform: translateY(-15px) rotateX(5deg) scale(1.03);
            background: rgba(255, 255, 255, 0.08);
            border-color: #00f2fe;
            box-shadow: 0 20px 50px rgba(0, 242, 254, 0.4);
        }

        /* =========================================
           5. XOAY XOAY QUẢ CẦU & VÒNG NĂNG LƯỢNG
           ========================================= */
        .sphere-wrapper {
            position: relative;
            width: 140px;
            height: 140px;
            margin-bottom: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Quả cầu cờ xoay 3D */
        .flag-sphere {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            box-shadow: 
                inset -10px -10px 30px rgba(0,0,0,0.7), 
                inset 10px 10px 30px rgba(255,255,255,0.2),
                0 0 20px rgba(0, 242, 254, 0.5);
            border: 4px solid rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 2;
            animation: spin3D 15s linear infinite; /* Xoay 3D */
        }
        /* Hiệu ứng bóng đổ trên quả cầu */
        .flag-sphere::after {
            content: '';
            position: absolute;
            top: 10%; left: 10%; width: 30%; height: 30%;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            filter: blur(5px);
        }

        /* Vòng năng lượng neon xoay quanh */
        .energy-ring {
            position: absolute;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: #00f2fe; /* Màu chính */
            border-bottom-color: #00f2fe;
            animation: ringSpin 4s linear infinite; /* Xoay vòng */
            z-index: 1;
            filter: drop-shadow(0 0 10px #00f2fe);
        }
        /* Tạo điểm nhấn trên vòng */
        .energy-ring::before, .energy-ring::after {
            content: '';
            position: absolute;
            width: 10px; height: 10px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 15px #fff;
        }
        .energy-ring::before { top: 10px; left: 10px; }
        .energy-ring::after { bottom: 10px; right: 10px; }

        /* Đổi màu vòng cho Dubai (Vàng) */
        .dubai .energy-ring { border-color: #ffcc00 transparent; filter: drop-shadow(0 0 10px #ffcc00); }
        /* Đổi màu vòng cho VN (Đỏ) */
        .vietnam .energy-ring { border-color: #ff3366 transparent; filter: drop-shadow(0 0 10px #ff3366); }

        /* Hover: Quả cầu xoay nhanh hơn */
        .gate-card:hover .flag-sphere { animation-duration: 4s; }
        /* Hover: Vòng xoay nhanh hơn và đổi màu */
        .gate-card:hover .energy-ring { animation-duration: 1s; border-color: #fff transparent; filter: drop-shadow(0 0 15px #fff); }

        /* =========================================
           6. TÊN QUỐC GIA NEON
           ========================================= */
        .country-name {
            font-weight: 800;
            font-size: 22px;
            color: #fff;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        .dubai .country-name { color: #ffcc00; text-shadow: 0 0 10px rgba(255, 204, 0, 0.7); }
        .vietnam .country-name { color: #ff4d4d; text-shadow: 0 0 10px rgba(255, 77, 77, 0.7); }

        /* =========================================
           7. NÚT BẤM - PHONG CÁCH CYBERPUNK
           ========================================= */
        .btn-enter {
            background: transparent;
            color: #00f2fe;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: 800;
            font-size: 16px;
            width: 100%;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            border: 2px solid #00f2fe;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.4), inset 0 0 10px rgba(0, 242, 254, 0.2);
            overflow: hidden;
        }

        .btn-enter:hover {
            background: #00f2fe;
            color: #000;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.8);
        }

        /* Màu nút riêng cho từng cổng */
        .dubai .btn-enter { color: #ffcc00; border-color: #ffcc00; box-shadow: 0 0 15px rgba(255, 204, 0, 0.4); }
        .dubai .btn-enter:hover { background: #ffcc00; }

        .thailand .btn-enter { color: #ff9900; border-color: #ff9900; box-shadow: 0 0 15px rgba(255, 153, 0, 0.4); }
        .thailand .btn-enter:hover { background: #ff9900; }

        .vietnam .btn-enter { color: #ff4d4d; border-color: #ff4d4d; box-shadow: 0 0 15px rgba(255, 77, 77, 0.4); }
        .vietnam .btn-enter:hover { background: #ff4d4d; }

        /* =========================================
           8. ANIMATIONS KEYFRAMES
           ========================================= */
        @keyframes spin3D {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }
        @keyframes ringSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(-360deg); } /* Xoay ngược */
        }
        @keyframes lightSweep {
            0% { left: -150%; }
            100% { left: 150%; }
        }

        /* =========================================
           9. RESPONSIVE
           ========================================= */
        @media (max-width: 768px) {
            .logo-box { font-size: 50px; padding: 10px 50px; }
            .title-section h1 { font-size: 32px; }
            .gate-container { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .gate-card { padding: 30px 15px; }
            .sphere-wrapper { width: 100px; height: 100px; }
            .flag-sphere { width: 80px; height: 80px; }
            .energy-ring { width: 100px; height: 100px; }
            .country-name { font-size: 16px; margin-bottom: 25px; }
            .btn-enter { font-size: 12px; padding: 10px; }
        }
        @media (max-width: 480px) {
            .gate-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="wrapper">
        <div class="logo-header">
            <div class="logo-box">XX88</div>
        </div>

        <div class="title-section">
            <h1>SIÊU CỔNG QUỐC TẾ 2026</h1>
            <p>Hệ thống link đã mở, mã hóa An Toàn cấp độ Quân Đội. Trải nghiệm không giới hạn ngay hôm nay!</p>
        </div>

        <div class="gate-container">
            
            <div class="gate-card singapore">
                <div class="sphere-wrapper">
                    <div class="energy-ring"></div>
                    <div class="flag-sphere" style="background-image: url('https://flagcdn.com/w320/sg.png');"></div>
                </div>
                <div class="country-name">HELLO SINGAPORE</div>
                <a href="https://xx88a.pro/" class="btn-enter">VÀO CỔNG CHÍNH</a>
            </div>

            <div class="gate-card dubai">
                <div class="sphere-wrapper">
                    <div class="energy-ring"></div>
                    <div class="flag-sphere" style="background-image: url('https://flagcdn.com/w320/ae.png');"></div>
                </div>
                <div class="country-name">DUBAI UAE</div>
                <a href="https://xx88a.pro/" class="btn-enter">KẾT NỐI NGAY</a>
            </div>

            <div class="gate-card thailand">
                <div class="sphere-wrapper">
                    <div class="energy-ring"></div>
                    <div class="flag-sphere" style="background-image: url('https://flagcdn.com/w320/th.png');"></div>
                </div>
                <div class="country-name">สวัสดี THAILAND</div>
                <a href="https://xx88a.pro/" class="btn-enter">TRUY CẬP THÁI</a>
            </div>

            <div class="gate-card vietnam">
                <div class="sphere-wrapper">
                    <div class="energy-ring"></div>
                    <div class="flag-sphere" style="background-image: url('https://flagcdn.com/w320/vn.png');"></div>
                </div>
                <div class="country-name">XIN CHÀO VIỆT NAM</div>
                <a href="https://xx88a.pro/" class="btn-enter">CỔNG VIỆT NAM</a>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        /* Cấu hình hiệu ứng hạt nền */
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": ["#00f2fe", "#ffcc00", "#ff3366"] }, /* Màu hạt neon */
                "shape": { "type": "circle" },
                "opacity": { "value": 0.5, "random": true },
                "size": { "value": 3, "random": true },
                "line_linked": { "enable": true, "distance": 150, "color": "#ffffff", "opacity": 0.2, "width": 1 },
                "move": { "enable": true, "speed": 2, "direction": "none", "random": true, "straight": false, "out_mode": "out" }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": { "onhover": { "enable": true, "mode": "grab" }, "onclick": { "enable": true, "mode": "push" } },
                "modes": { "grab": { "distance": 140, "line_linked": { "opacity": 1 } }, "push": { "particles_nb": 4 } }
            },
            "retina_detect": true
        });
    </script>
</body>
</html>
