<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XX88 - CÙNG BẠN CHINH PHỤC ĐỈNH CAO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root {
            --primary: #00f2fe;
            --gold: #ffcc00;
            --hot: #ff3366;
            --thai: #ff9900;
            --bg-dark: #020205;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: default; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #particles-js {
            position: fixed;
            width: 100%; height: 100%;
            top: 0; left: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* 1. THANH THÔNG BÁO - Tối ưu mobile */
        .news-ticker-wrap {
            position: fixed;
            top: 10px;
            width: 95%;
            max-width: 1100px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 0;
            overflow: hidden;
        }

        .ticker-content {
            display: flex;
            white-space: nowrap;
            animation: ticker-move 30s linear infinite;
        }

        .ticker-item {
            display: flex;
            align-items: center;
            padding: 0 30px;
            font-size: 11px; /* Nhỏ hơn trên mobile */
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
        }

        /* Hiệu ứng Icon động */
        .icon-ani { display: inline-block; margin-right: 8px; font-size: 14px; }
        .ani-shield { animation: heartbeat 1.5s ease-in-out infinite; }
        .ani-lock { animation: blink 2s linear infinite; }
        .ani-earth { animation: rotateIcon 4s linear infinite; }
        .ani-bolt { animation: pulse 0.8s ease-in-out infinite; }
        .ani-headset { animation: swing 2s ease-in-out infinite; }

        @keyframes heartbeat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
        @keyframes rotateIcon { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        @keyframes pulse { 0% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.3); filter: brightness(1.5); } }
        @keyframes swing { 0%, 100% { transform: rotate(-15deg); } 50% { transform: rotate(15deg); } }
        @keyframes ticker-move { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        /* 2. GIAO DIỆN CHÍNH */
        .wrapper {
            position: relative;
            z-index: 5;
            width: 100%;
            max-width: 1300px;
            padding: 100px 15px 50px; /* Giảm padding mobile */
            text-align: center;
        }

        .logo-img {
            max-width: 220px; /* Thu nhỏ logo mobile */
            width: 70%;
            filter: drop-shadow(0 0 20px rgba(0, 242, 254, 0.3));
            margin-bottom: 10px;
        }

        .slogan {
            font-size: 12px; /* Thu nhỏ slogan */
            font-weight: 800;
            letter-spacing: 3px; /* Giảm khoảng cách chữ */
            background: linear-gradient(to right, #fff, var(--primary), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            display: block;
        }

        .live-counter {
            background: rgba(74, 222, 128, 0.05);
            border: 1px solid rgba(74, 222, 128, 0.4);
            padding: 10px 20px;
            border-radius: 50px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 25px;
            font-weight: 800;
            font-size: 14px;
        }

        .dot-live {
            width: 10px; height: 10px;
            background: #4ade80;
            border-radius: 50%;
            position: relative;
        }
        .dot-live::after {
            content: '';
            position: absolute; width: 100%; height: 100%;
            background: #4ade80; border-radius: 50%;
            animation: ping-live 1.2s infinite;
        }
        @keyframes ping-live {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(3); opacity: 0; }
        }

        /* 3. GRID CARD - Responsive cực mạnh */
        .gate-grid {
            display: grid;
            grid-template-columns: 1fr; /* 1 cột cho mobile mặc định */
            gap: 15px;
            margin-top: 40px;
        }

        /* Tablet dùng 2 cột */
        @media (min-width: 768px) {
            .gate-grid { grid-template-columns: repeat(2, 1fr); }
            .logo-img { max-width: 280px; }
            .slogan { font-size: 16px; letter-spacing: 6px; }
        }

        /* PC dùng 4 cột */
        @media (min-width: 1024px) {
            .gate-grid { grid-template-columns: repeat(4, 1fr); }
        }

        .gate-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 30px 15px;
            transition: all 0.3s ease;
            display: flex; flex-direction: column; align-items: center;
        }

        .gate-card:active { transform: scale(0.98); } /* Hiệu ứng nhấn trên mobile */

        .sphere-box { width: 80px; height: 80px; margin-bottom: 15px; border-radius: 50%; }
        .sphere { width: 100%; height: 100%; border-radius: 50%; background-size: cover; background-position: center; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }

        .gate-card h2 { font-size: 18px; margin-bottom: 5px; }

        .ping-text { font-size: 10px; font-weight: bold; margin-bottom: 15px; font-family: monospace; }
        
        .btn-enter { 
            width: 100%; 
            padding: 15px; /* Nút to hơn để dễ bấm */
            border: 1px solid rgba(255,255,255,0.1); 
            color: #fff; 
            text-decoration: none; 
            text-transform: uppercase; 
            font-size: 12px; 
            font-weight: 800; 
            border-radius: 12px; 
            background: rgba(255,255,255,0.05); 
            transition: 0.3s; 
        }

        @media (hover: hover) {
            .gate-card:hover { background: rgba(255, 255, 255, 0.05); border-color: var(--primary); }
            .gate-card:hover .btn-enter { background: var(--primary); color: #000; box-shadow: 0 0 20px var(--primary); border-color: transparent; }
        }
        
        /* Chế độ mobile: Nút luôn nổi bật */
        @media (max-width: 767px) {
            .btn-enter { background: rgba(0, 242, 254, 0.1); border-color: var(--primary); }
        }
    </style>
</head>
<body>

    <div class="news-ticker-wrap" data-aos="fade-down">
        <div class="ticker-content">
            <div class="ticker-item"><span class="icon-ani ani-shield">🛡️</span> BẢO MẬT ĐA LỚP</div>
            <div class="ticker-item"><span class="icon-ani ani-lock">🔒</span> MÃ HÓA SSL</div>
            <div class="ticker-item"><span class="icon-ani ani-earth">🌍</span> MÁY CHỦ QUỐC TẾ</div>
            <div class="ticker-item"><span class="icon-ani ani-bolt">⚡</span> KẾT NỐI LIÊN TỤC</div>
            <div class="ticker-item"><span class="icon-ani ani-headset">🎧</span> HỖ TRỢ 24/7</div>
            <div class="ticker-item"><span class="icon-ani ani-shield">🛡️</span> BẢO MẬT ĐA LỚP</div>
            <div class="ticker-item"><span class="icon-ani ani-lock">🔒</span> MÃ HÓA SSL</div>
        </div>
    </div>

    <div id="particles-js"></div>

    <div class="wrapper">
        <div class="logo-container" data-aos="zoom-in" data-aos-duration="1200">
            <img src="https://xx88.chat/wp-content/uploads/2025/08/logo-xx88-kjc.webp" alt="XX88 Logo" class="logo-img">
            <span class="slogan">CÙNG BẠN CHINH PHỤC ĐỈNH CAO</span>
        </div>

        <div class="live-counter" data-aos="fade-up">
            <div class="dot-live"></div>
            ONLINE: <span id="online-count" style="color:#4ade80; margin-left:5px;">32,450</span>
        </div>

        <div class="gate-grid">
            <div class="gate-card" data-aos="fade-up">
                <div class="sphere-box"><div class="sphere" style="background-image: url('https://flagcdn.com/w640/sg.png');"></div></div>
                <h2 style="color: var(--primary);">SINGAPORE</h2>
                <div class="ping-text" style="color: #4ade80;">● PING: <span id="ping-sg">12</span>MS</div>
                <a href="http://xx88new.top/" class="btn-enter">VÀO GAME</a>
            </div>

            <div class="gate-card" data-aos="fade-up" data-aos-delay="100">
                <div class="sphere-box"><div class="sphere" style="background-image: url('https://flagcdn.com/w640/ae.png');"></div></div>
                <h2 style="color: var(--gold);">DUBAI UAE</h2>
                <div class="ping-text" style="color: var(--gold);">● PING: <span id="ping-ae">24</span>MS</div>
                <a href="http://xx88new.top/" class="btn-enter">VÀO GAME</a>
            </div>

            <div class="gate-card" data-aos="fade-up" data-aos-delay="200">
                <div class="sphere-box"><div class="sphere" style="background-image: url('https://flagcdn.com/w640/th.png');"></div></div>
                <h2 style="color: var(--thai);">THÁI LAN</h2>
                <div class="ping-text" style="color: var(--thai);">● PING: <span id="ping-th">19</span>MS</div>
                <a href="http://xx88new.top/" class="btn-enter">VÀO GAME</a>
            </div>

            <div class="gate-card" data-aos="fade-up" data-aos-delay="300">
                <div class="sphere-box"><div class="sphere" style="background-image: url('https://flagcdn.com/w640/vn.png');"></div></div>
                <h2 style="color: var(--hot);">VIỆT NAM</h2>
                <div class="ping-text" style="color: var(--hot);">● PING: <span id="ping-vn">05</span>MS</div>
                <a href="http://xx88new.top/" class="btn-enter">VÀO GAME</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <script>
        AOS.init({ once: true, disable: 'mobile' }); // Tắt AOS trên mobile để mượt hơn nếu cần
        
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 30 }, // Giảm số lượng hạt cho mobile đỡ lag
                "color": { "value": "#4facfe" },
                "opacity": { "value": 0.2 },
                "size": { "value": 1 },
                "line_linked": { "enable": true, "distance": 150, "color": "#4facfe", "opacity": 0.1 },
                "move": { "enable": true, "speed": 1 }
            }
        });

        // Nhảy số Online
        let count = Math.floor(Math.random() * (45000 - 25000 + 1)) + 25000;
        const countEl = document.getElementById('online-count');
        function updateOnline() {
            let change = Math.floor(Math.random() * 200) - 50; 
            count += change;
            if (count < 20000) count += 500;
            if (count > 50000) count -= 500;
            countEl.innerText = count.toLocaleString();
            setTimeout(updateOnline, Math.random() * 2000 + 1000);
        }
        updateOnline();

        // Nhảy số Ping
        function updatePing(id, base) {
            let variation = Math.floor(Math.random() * 5) - 2;
            let newPing = base + variation;
            document.getElementById(id).innerText = (newPing < 10 ? '0' : '') + Math.max(1, newPing);
            setTimeout(() => updatePing(id, base), Math.random() * 3000 + 2000);
        }
        updatePing('ping-sg', 12); updatePing('ping-ae', 24); updatePing('ping-th', 19); updatePing('ping-vn', 5);
    </script>
</body>
</html>
